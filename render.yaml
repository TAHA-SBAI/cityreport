# Configuration de déploiement Render pour le backend CityReport.
# Render lit ce fichier pour créer automatiquement le service web + la base PostgreSQL.

services:
  - type: web
    name: cityreport-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cityreport-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.4"

databases:
  - name: cityreport-db
    databaseName: cityreport
    plan: free
